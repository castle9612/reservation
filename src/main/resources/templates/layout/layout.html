<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - 예약 시스템' : '예약 시스템'}">예약 시스템</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a th:href="@{/}">홈</a></li>
            <li><a th:href="@{/announcement/list}">공지사항</a></li>
            <li><a th:href="@{/staff}">스태프</a></li>
            <li><a th:href="@{/course/list}">코스안내</a></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/mypage}">마이페이지</a></li>
            <li sec:authorize="isAnonymous()"><a th:href="@{/login}">로그인</a></li>
            <li sec:authorize="isAnonymous()"><a th:href="@{/signup}">회원가입</a></li>
            <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/dashboard}">관리자 대시보드</a></li>
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">로그아웃</button>
                </form>
            </li>
        </ul>
    </nav>
</header>
<main>
    <th:block layout:fragment="content"></th:block>
</main>
<footer>
    <p>© 2026 예약 시스템</p>
</footer>
</body>
</html>
