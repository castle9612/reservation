<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스태프 목록 - 예약 시스템</title>
</head>
<body>
<h1>스태프 목록</h1>

<p th:if="${successMessage}" th:text="${successMessage}" style="color:green;"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></p>

<div sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/staff/new}">새 스태프 등록</a>
</div>

<div th:if="${#lists.isEmpty(staffList)}">
    등록된 스태프가 없습니다.
</div>

<table th:if="${!#lists.isEmpty(staffList)}" border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>이름</th>
        <th>프로필 사진</th>
        <th sec:authorize="hasRole('ADMIN')">관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="staff : ${staffList}">
        <td th:text="${staff.id}"></td>
        <td th:text="${staff.name}"></td>
        <td>
            <span th:if="${staff.profilePicture == null or staff.profilePicture.isBlank()}">-</span>
            <img th:if="${staff.profilePicture != null and !staff.profilePicture.isBlank()}"
                 th:src="${staff.profilePicture}" alt="staff image" style="max-width:120px;">
        </td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{'/staff/edit/' + ${staff.id}}">수정</a>
            <form th:action="@{'/staff/delete/' + ${staff.id}}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
