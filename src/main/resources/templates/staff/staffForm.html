<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>직원 등록</title>
</head>
<body>
<div th:replace="~{layout/layout :: layout(~{::title}, ~{::#main-content})}">
  <main id="main-content">
    <h2 class="mb-4">직원 등록</h2>

    <form th:action="@{/staff}" th:object="${staffDTO}" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" th:field="*{name}" class="form-control">
      </div>

      <div class="form-group">
        <label for="profileImage">프로필 이미지</label>
        <input type="file" id="profileImage" name="profileImage" class="form-control-file">
      </div>

      <button type="submit" class="btn btn-primary">저장</button>
      <a th:href="@{/staff}" class="btn btn-secondary">목록</a>
    </form>
  </main>
</div>
</body>
</html>
