<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 예약 시스템</title>
</head>
<body>
<h1>회원가입</h1>

<p th:if="${signupErrorMessage}" th:text="${signupErrorMessage}" style="color:red;"></p>

<form th:action="@{/signup}" method="post" th:object="${userDTO}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div>
        <label for="userId">아이디:</label>
        <input id="userId" th:field="*{userId}" type="text" required>
    </div>

    <div>
        <label for="password">비밀번호:</label>
        <input id="password" th:field="*{password}" type="password" required>
    </div>

    <div>
        <label for="userName">이름:</label>
        <input id="userName" th:field="*{userName}" type="text" required>
    </div>

    <div>
        <label for="userEmail">이메일:</label>
        <input id="userEmail" th:field="*{userEmail}" type="email" required>
    </div>

    <div>
        <label for="phoneNumber">전화번호:</label>
        <input id="phoneNumber" th:field="*{phoneNumber}" type="text" placeholder="01012345678" required>
    </div>

    <div>
        <label for="birthdate">생년월일:</label>
        <input id="birthdate" th:field="*{birthdate}" type="text" placeholder="1999-01-01">
    </div>

    <div>
        <label for="gender">성별:</label>
        <select id="gender" th:field="*{gender}">
            <option value="">선택안함</option>
            <option value="남성">남성</option>
            <option value="여성">여성</option>
        </select>
    </div>

    <div>
        <label for="maritalStatus">결혼여부:</label>
        <select id="maritalStatus" th:field="*{maritalStatus}">
            <option th:value="false">미혼</option>
            <option th:value="true">기혼</option>
        </select>
    </div>

    <div>
        <label>
            <input type="checkbox" th:field="*{privacyConsent}">
            개인정보 수집 및 이용에 동의합니다.
        </label>
    </div>

    <button type="submit">가입하기</button>
</form>

<p>이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a></p>
</body>
</html>
