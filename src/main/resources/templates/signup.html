<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans KR", Arial, sans-serif;
            background: #f5f2ee;
            color: #2b2b2b;
        }
        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: #fcfbfa;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        h1 { margin-top: 0; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field {
            margin-bottom: 16px;
        }
        .field.full {
            grid-column: 1 / -1;
        }
        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .field input, .field select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dbcabb;
            border-radius: 16px;
            background: #fff;
            font-size: 15px;
        }
        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: #d9c6b7;
            color: #2b2b2b;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .msg {
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            background: #fbefec;
            border: 1px solid #efc0b7;
            color: #8b3d2e;
        }
        .links a {
            color: #6a513e;
            text-decoration: none;
            margin-right: 12px;
        }
        @media (max-width: 760px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>회원가입</h1>

        <div th:if="${signupErrorMessage}" class="msg" th:text="${signupErrorMessage}"></div>

        <form th:action="@{/signup}" method="post" th:object="${userDTO}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{role}" value="USER">

            <div class="grid">
                <div class="field">
                    <label for="userId">아이디</label>
                    <input type="text" id="userId" th:field="*{userId}" required>
                </div>

                <div class="field">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" th:field="*{password}" required>
                </div>

                <div class="field">
                    <label for="userName">이름</label>
                    <input type="text" id="userName" th:field="*{userName}" required>
                </div>

                <div class="field">
                    <label for="userEmail">이메일</label>
                    <input type="email" id="userEmail" th:field="*{userEmail}" required>
                </div>

                <div class="field">
                    <label for="phoneNumber">전화번호</label>
                    <input type="text" id="phoneNumber" th:field="*{phoneNumber}" placeholder="01012345678" required>
                </div>

                <div class="field">
                    <label for="birthdate">생년월일</label>
                    <input type="date" id="birthdate" th:field="*{birthdate}">
                </div>

                <div class="field">
                    <label for="gender">성별</label>
                    <select id="gender" th:field="*{gender}">
                        <option value="">선택안함</option>
                        <option value="MALE">남성</option>
                        <option value="FEMALE">여성</option>
                    </select>
                </div>

                <div class="field">
                    <label for="maritalStatus">결혼여부</label>
                    <select id="maritalStatus" th:field="*{maritalStatus}">
                        <option th:value="false">미혼</option>
                        <option th:value="true">기혼</option>
                    </select>
                </div>

                <div class="field full">
                    <label class="checkbox">
                        <input type="checkbox" th:field="*{privacyConsent}">
                        개인정보 수집 및 이용에 동의합니다.
                    </label>
                </div>
            </div>

            <button type="submit" class="btn">가입하기</button>
        </form>

        <div class="links" style="margin-top:18px;">
            <a th:href="@{/login}">로그인</a>
            <a th:href="@{/}">홈으로</a>
        </div>
    </div>
</div>
</body>
</html>
