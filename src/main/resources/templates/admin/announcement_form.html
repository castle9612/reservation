<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${announcementDTO.id != null} ? '공지사항 수정' : '새 공지사항 작성'">공지사항 작성</title>

  <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.6.2/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/webjars/summernote/0.8.20/dist/summernote-bs4.min.css}">

  <style>
    body {
        background: #f8f9fa;
    }

    .container-box {
        max-width: 1000px;
        margin: 40px auto;
    }

    .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .file-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
    }
  </style>
</head>
<body>
<div class="container container-box">
  <div class="card">
    <div class="card-body p-4">
      <h2 class="mb-4" th:text="${announcementDTO.id != null} ? '공지사항 수정' : '새 공지사항 작성'">공지사항 작성</h2>

      <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
      <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

      <form th:action="${announcementDTO.id != null} ? @{/admin/announcements/{id}/edit(id=${announcementDTO.id})} : @{/admin/announcements}"
            th:object="${announcementDTO}"
            method="post"
            enctype="multipart/form-data">

        <input type="hidden" th:if="${announcementDTO.id != null}" th:field="*{id}"/>

        <div class="form-group">
          <label for="title">제목</label>
          <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="제목 입력">
          <div class="text-danger mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="form-group">
          <label for="content">내용</label>
          <textarea id="content" th:field="*{content}" class="form-control"></textarea>
          <div class="text-danger mt-1" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
        </div>

        <div class="form-group">
          <label for="newAttachmentFiles">첨부 파일</label>
          <input type="file" id="newAttachmentFiles" name="newAttachmentFiles" class="form-control-file" multiple>
        </div>

        <div class="form-group"
             th:if="${announcementDTO.originalAttachmentNames != null and !#lists.isEmpty(announcementDTO.originalAttachmentNames)}">
          <label>기존 첨부 파일</label>
          <div th:each="fileName, stat : ${announcementDTO.originalAttachmentNames}" class="file-item">
            <a th:href="@{/announcement/attachment/{id}/{index}(id=${announcementDTO.id}, index=${stat.index})}"
               th:text="${fileName}">첨부파일</a>

            <label class="mb-0">
              <input type="checkbox"
                     name="deletedAttachmentPaths"
                     th:value="${announcementDTO.attachmentPaths[stat.index]}">
              삭제
            </label>
          </div>
        </div>

        <div class="d-flex gap-2">
          <a th:href="${announcementDTO.id != null} ? @{/announcement/detail/{id}(id=${announcementDTO.id})} : @{/announcement/list}"
             class="btn btn-secondary mr-2">
            취소
          </a>
          <button type="submit" class="btn btn-primary">저장하기</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/4.6.2/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/summernote/0.8.20/dist/summernote-bs4.min.js}"></script>

<script>
  $(function () {
      $('#content').summernote({
          height: 400,
          placeholder: '공지 내용을 입력해줘',
          toolbar: [
              ['style', ['style']],
              ['font', ['bold', 'underline', 'italic', 'clear']],
              ['fontsize', ['fontsize']],
              ['color', ['color']],
              ['para', ['ul', 'ol', 'paragraph']],
              ['table', ['table']],
              ['insert', ['link', 'picture']],
              ['view', ['codeview']]
          ],
          fontSizes: ['8', '9', '10', '11', '12', '14', '16', '18', '20', '24', '28', '32', '36'],
          callbacks: {
              onImageUpload: function (files) {
                  for (let i = 0; i < files.length; i++) {
                      uploadImage(files[i]);
                  }
              }
          }
      });

      function uploadImage(file) {
          const data = new FormData();
          data.append("file", file);

          $.ajax({
              url: '/admin/announcements/uploadSummernoteImageFile',
              type: 'POST',
              data: data,
              contentType: false,
              processData: false,
              success: function (resp) {
                  if (resp.url) {
                      $('#content').summernote('insertImage', resp.url);
                  } else {
                      alert('이미지 업로드 응답이 이상함');
                  }
              },
              error: function (xhr) {
                  console.error(xhr);
                  alert('이미지 업로드 실패');
              }
          });
      }
  });
</script>
</body>
</html>
