<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.6.2/css/bootstrap.min.css}">
  <style>
    body {
        background: #f8f9fa;
    }

    .dashboard-wrapper {
        max-width: 1100px;
        margin: 40px auto;
    }

    .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
    }
  </style>
</head>
<body>
<div class="container dashboard-wrapper">
  <h1 class="mb-4 text-center">관리자 대시보드</h1>

  <div class="card">
    <div class="card-body">
      <p>관리자 님, 환영합니다.</p>

      <h4>공지사항 관리</h4>
      <p>공지사항을 작성, 수정, 삭제합니다.</p>
      <a href="/admin/announcements" class="btn btn-info mb-3">공지사항 관리로 이동</a>

      <h4>코스 관리</h4>
      <p>코스를 등록, 수정, 삭제합니다.</p>
      <a href="/courses" class="btn btn-primary mb-3">코스 관리로 이동</a>

      <h4>스태프 관리</h4>
      <p>스태프(강사)를 등록, 수정, 삭제합니다.</p>
      <a href="/staffs" class="btn btn-warning mb-3">스태프 관리로 이동</a>

      <h4>예약 관리</h4>
      <p>전체 예약을 확인하고 관리합니다.</p>
      <a href="/reservations" class="btn btn-danger mb-3">예약 관리로 이동</a>

      <h4>사용자 관리</h4>
      <p>사용자 전체 목록을 조회하고 수정할 수 있습니다.</p>
      <a href="/admin/users" class="btn btn-dark mb-4">전체 사용자 목록 보기</a>

      <hr>

      <h5>사용자 ID로 상세 조회</h5>
      <form action="/admin/userdetails" method="get">
        <div class="form-group">
          <input type="text" name="userId" class="form-control" placeholder="사용자 ID 입력" required>
        </div>
        <button type="submit" class="btn btn-success">조회</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
