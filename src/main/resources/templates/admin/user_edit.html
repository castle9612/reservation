<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 수정</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.6.2/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4" th:if="${user != null}">
  <h2 class="mb-4">사용자 수정</h2>

  <form th:action="@{/admin/userdetails/{userId}(userId=${user.userId})}" method="post">
    <div class="form-group">
      <label>아이디</label>
      <input type="text" class="form-control" th:value="${user.userId}" readonly>
    </div>

    <div class="form-group">
      <label>이름</label>
      <input type="text" name="name" class="form-control" th:value="${user.name}">
    </div>

    <div class="form-group">
      <label>이메일</label>
      <input type="text" name="email" class="form-control" th:value="${user.email}">
    </div>

    <div class="form-group">
      <label>전화번호</label>
      <input type="text" name="phoneNumber" class="form-control" th:value="${user.phoneNumber}">
    </div>

    <div class="form-group">
      <label>패키지 횟수</label>
      <input type="number" name="packageCount" class="form-control" th:value="${user.packageCount}">
    </div>

    <div class="form-group">
      <label>권한</label>
      <select name="role" class="form-control">
        <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
        <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
      </select>
    </div>

    <div class="form-group">
      <label>관리자 메모</label>
      <textarea name="memo" class="form-control" rows="5" th:text="${user.memo}"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">저장</button>
    <a href="/admin/users" class="btn btn-secondary">목록</a>
  </form>
</div>

<div class="container mt-4" th:if="${user == null}">
  <div class="alert alert-warning">사용자를 찾을 수 없음</div>
  <a href="/admin/users" class="btn btn-secondary">목록</a>
</div>
</body>
</html>
