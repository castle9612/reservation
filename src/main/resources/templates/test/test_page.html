<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기능 테스트 페이지 - 예약 시스템</title>
</head>
<body>
<h1>기능 테스트 페이지</h1>

<section>
    <h2>인증 상태</h2>
    <div sec:authorize="isAuthenticated()">
        <p>로그인됨: <span sec:authentication="name"></span></p>
        <p>권한: <span sec:authentication="authorities"></span></p>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">로그아웃</button>
        </form>
    </div>
    <div sec:authorize="isAnonymous()">
        <p>로그인되지 않음. <a th:href="@{/login}">로그인</a> | <a th:href="@{/signup}">회원가입</a></p>
    </div>
</section>

<section>
    <h2>기본 페이지</h2>
    <ul>
        <li><a th:href="@{/}">홈 (index)</a></li>
    </ul>
</section>

<section>
    <h2>공지사항</h2>
    <ul>
        <li><a th:href="@{/announcement/list}">공지사항 목록 (사용자)</a></li>
        <li><a th:href="@{/announcement/detail/1}">상세 (ID:1)</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/announcements}">공지사항 관리 (관리자)</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/announcements/new}">새 공지 작성 (관리자)</a></li>
    </ul>
</section>

<section>
    <h2>스태프</h2>
    <ul>
        <li><a th:href="@{/staff}">스태프 목록</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/staff/new}">새 스태프 등록 (관리자)</a></li>
    </ul>
</section>
</body>
</html>
