<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 시스템</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans KR", Arial, sans-serif;
            background: #f5f2ee;
            color: #2b2b2b;
        }
        .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: #fcfbfa;
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 24px;
        }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }
        .brand small {
            display: block;
            color: #a37d5f;
            letter-spacing: 3px;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .brand h1 {
            margin: 0;
            font-size: 28px;
        }
        .menu {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .menu a, .menu button {
            text-decoration: none;
            color: #6a513e;
            background: #efe8df;
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 14px;
        }
        .hero {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        .hero h2 {
            font-size: 30px;
            line-height: 1.4;
            margin: 8px 0 20px;
        }
        .hero p {
            font-size: 16px;
            line-height: 1.8;
            color: #4f4a45;
        }
        .status-box {
            border: 1px solid #e0cdbd;
            background: #f6f1eb;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .section-title {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 22px;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid #eadfd4;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item a {
            color: #6a513e;
            text-decoration: none;
        }
        .muted {
            color: #8a7a6c;
            font-size: 14px;
        }
        @media (max-width: 900px) {
            .hero, .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div class="nav">
            <div class="brand">
                <small>THERAPY RESERVATION</small>
                <h1>차분한 톤의 예약 프런트</h1>
            </div>

            <div class="menu">
                <a th:href="@{/}">홈</a>
                <a th:href="@{/login}" th:unless="${#authorization.expression('isAuthenticated()')}">로그인</a>
                <a th:href="@{/signup}" th:unless="${#authorization.expression('isAuthenticated()')}">회원가입</a>
                <a th:href="@{/announcement/list}">공지사항</a>
                <a th:href="@{/staff}">스태프</a>
                <a th:href="@{/test}">테스트</a>

                <form th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">로그아웃</button>
                </form>
            </div>
        </div>
    </div>

    <div class="card hero">
        <div>
            <div class="muted" style="letter-spacing:3px; color:#a37d5f;">CALM CARE EXPERIENCE</div>
            <h2>긴장을 덜고 예약 흐름은 더 부드럽게. 그런 쪽으로 다시 정리했다.</h2>
            <p>
                정보 밀도를 낮추고, 배경은 부드럽게, 카드와 여백은 넉넉하게 뒀다.
                테라피 사이트는 할인 전단지처럼 보이면 신뢰가 바로 증발하니까.
            </p>
        </div>

        <div>
            <div class="status-box">
                인증 상태:
                <span th:text="${#authorization.expression('isAuthenticated()') ? '로그인' : '비로그인'}"></span>
            </div>
            <div class="status-box">
                사용자:
                <span th:text="${#authorization.expression('isAuthenticated()') ? #authentication.name : '없음'}"></span>
            </div>
            <div class="status-box">
                CSRF:
                <span th:text="${_csrf != null ? '수신 완료' : '없음'}"></span>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3 class="section-title">공지사항 바로가기</h3>
            <div class="list-item">
                <div>
                    <strong>공지사항 목록 보기</strong>
                    <div class="muted">사용자 공개 페이지</div>
                </div>
                <a th:href="@{/announcement/list}">이동</a>
            </div>
        </div>

        <div class="card">
            <h3 class="section-title">스태프 바로가기</h3>
            <div class="list-item">
                <div>
                    <strong>스태프 목록 보기</strong>
                    <div class="muted">목록/상세는 공개</div>
                </div>
                <a th:href="@{/staff}">이동</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
