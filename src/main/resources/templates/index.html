<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layout(~{::title}, ~{::#main-content})}">
<head>
    <title>홈 - 예약 시스템</title>
</head>
<body>
<div id="main-content">
    <div class="hero-shell p-5 text-center">
        <h1 class="display-4 font-weight-bold mb-3">CALM CARE EXPERIENCE</h1>
        <p class="lead text-muted mb-4">
            긴장을 덜고, 예약 흐름은 더 부드럽게.<br>
            필요한 기능이 한눈에 보이게 다시 정리했다.
        </p>

        <div class="d-flex flex-wrap justify-content-center">
            <a th:href="@{/announcement/list}" class="btn btn-primary cta-btn m-2">공지사항</a>
            <a th:href="@{/staff}" class="btn btn-outline-primary cta-btn m-2">스태프 보기</a>
            <a th:href="@{/courses}" class="btn btn-info cta-btn m-2">코스 안내</a>
            <a th:href="@{/reservations/new/non-member}" class="btn btn-success cta-btn m-2">비회원 예약</a>
            <a th:href="@{/reservations/search}" class="btn btn-outline-success cta-btn m-2">비회원 예약조회</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/reservations/new/member}" class="btn btn-warning cta-btn m-2">회원 예약</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/reservations}" class="btn btn-outline-dark cta-btn m-2">내 예약</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/courses/new}" class="btn btn-dark cta-btn m-2">코스 등록</a>
        </div>
    </div>
</div>
</body>
</html>
