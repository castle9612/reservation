<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans KR", Arial, sans-serif;
            background: #f5f2ee;
            color: #2b2b2b;
        }
        .wrap {
            max-width: 920px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: #fcfbfa;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }
        h1 { margin-top: 0; }
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dbcabb;
            border-radius: 16px;
            background: #fff;
            font-size: 15px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: #d9c6b7;
            color: #2b2b2b;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .msg {
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .error { background: #fbefec; border: 1px solid #efc0b7; color: #8b3d2e; }
        .success { background: #edf8ef; border: 1px solid #bfe0c5; color: #23623a; }
        .links a {
            color: #6a513e;
            text-decoration: none;
            margin-right: 12px;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>로그인</h1>

        <div th:if="${errorMessage}" class="msg error" th:text="${errorMessage}"></div>
        <div th:if="${signupSuccessMessage}" class="msg success" th:text="${signupSuccessMessage}"></div>
        <div th:if="${logoutMessage}" class="msg success" th:text="${logoutMessage}"></div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="field">
                <label for="userId">아이디</label>
                <input type="text" id="userId" name="userId" autocomplete="username" required>
            </div>

            <div class="field">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn">로그인</button>
        </form>

        <div class="links" style="margin-top:18px;">
            <a th:href="@{/signup}">회원가입</a>
            <a th:href="@{/}">홈으로</a>
        </div>
    </div>
</div>
</body>
</html>
