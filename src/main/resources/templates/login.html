<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 예약 시스템</title>
</head>
<body>
<h1>로그인</h1>

<p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></p>
<p th:if="${signupSuccessMessage}" th:text="${signupSuccessMessage}" style="color:green;"></p>
<p th:if="${param.logout}" style="color:green;">성공적으로 로그아웃되었습니다.</p>

<form th:action="@{/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div>
        <label for="userId">아이디:</label>
        <input id="userId" name="userId" type="text" required>
    </div>

    <div>
        <label for="password">비밀번호:</label>
        <input id="password" name="password" type="password" required>
    </div>

    <button type="submit">로그인</button>
</form>

<p>
    계정이 없으신가요? <a th:href="@{/signup}">회원가입</a>
    <a th:href="@{/reservations/guest-search}">비회원 예약조회</a>
</p>
</body>
</html>
