<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>공지사항 목록</title>
</head>
<body>
<div th:replace="~{layout/layout :: layout(~{::title}, ~{::#main-content})}">
  <main id="main-content">
    <h2 class="mb-4">공지사항</h2>

    <div class="mb-3">
      <a th:href="@{/}" class="btn btn-secondary">홈</a>
      <a th:href="@{/admin/announcements}" class="btn btn-dark"
         sec:authorize="hasRole('ADMIN')">관리</a>
    </div>

    <div th:if="${announcements == null or #lists.isEmpty(announcements)}" class="alert alert-info">
      등록된 공지사항이 없습니다.
    </div>

    <div th:unless="${announcements == null or #lists.isEmpty(announcements)}">
      <table class="table table-bordered table-hover">
        <thead>
        <tr>
          <th style="width: 10%;">번호</th>
          <th>제목</th>
          <th style="width: 20%;">작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="announcement : ${announcements}">
          <td th:text="${announcement.id}">1</td>
          <td>
            <a th:href="@{/announcement/{id}(id=${announcement.id})}"
               th:text="${announcement.title}">공지 제목</a>
          </td>
          <td th:text="${#temporals.format(announcement.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-14</td>
        </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
</body>
</html>
