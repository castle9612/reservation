<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>공지사항</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.6.2/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-4">
  <h1>공지사항</h1>

  <div class="mb-3" sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/admin/announcements/new}" class="btn btn-primary">새 공지사항 작성</a>
  </div>

  <table class="table table-bordered table-hover" th:if="${announcements != null and !#lists.isEmpty(announcements)}">
    <thead>
    <tr>
      <th>번호</th>
      <th>제목</th>
      <th>작성일</th>
      <th sec:authorize="hasRole('ADMIN')">작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="announcement : ${announcements}">
      <td th:text="${announcement.id}">1</td>
      <td>
        <a th:href="@{/announcement/detail/{id}(id=${announcement.id})}"
           th:text="${announcement.title}">제목</a>
      </td>
      <td th:text="${#temporals.format(announcement.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-14</td>
      <td sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/admin/announcements/{id}/edit(id=${announcement.id})}" class="btn btn-sm btn-warning">수정</a>
        <form th:action="@{/admin/announcements/{id}/delete(id=${announcement.id})}" method="post" style="display:inline;">
          <button type="submit" class="btn btn-sm btn-danger">삭제</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <div th:if="${announcements == null or #lists.isEmpty(announcements)}" class="alert alert-info">
    등록된 공지사항이 없습니다.
  </div>
</div>
<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/4.6.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
