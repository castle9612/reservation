<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 상세</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.6.2/css/bootstrap.min.css}">
  <style>
    body {
        background: #f8f9fa;
    }

    .container-box {
        max-width: 1000px;
        margin: 40px auto;
    }

    .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .content-box img {
        max-width: 100%;
        height: auto;
    }
  </style>
</head>
<body>
<div class="container container-box" th:if="${announcement != null}">
  <div class="card">
    <div class="card-body p-4">
      <h2 th:text="${announcement.title}">제목</h2>
      <p class="text-muted mb-4">
        작성일:
        <span th:text="${announcement.createdAt != null ? #temporals.format(announcement.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></span>
      </p>

      <hr>

      <div class="content-box mb-4" th:utext="${announcement.content}">내용</div>

      <div th:if="${announcement.originalAttachmentNames != null and !#lists.isEmpty(announcement.originalAttachmentNames)}">
        <h5>첨부파일</h5>
        <ul>
          <li th:each="fileName, stat : ${announcement.originalAttachmentNames}">
            <a th:href="@{/announcement/attachment/{id}/{index}(id=${announcement.id}, index=${stat.index})}"
               th:text="${fileName}">
              파일 다운로드
            </a>
          </li>
        </ul>
        <hr>
      </div>

      <a th:href="@{/announcement/list}" class="btn btn-secondary">목록으로</a>

      <span sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/announcements/{id}/edit(id=${announcement.id})}" class="btn btn-primary">수정</a>
                <form th:action="@{/admin/announcements/{id}/delete(id=${announcement.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger">삭제</button>
                </form>
            </span>
    </div>
  </div>
</div>

<div class="container container-box" th:if="${announcement == null}">
  <div class="alert alert-warning">
    해당 공지사항을 찾을 수 없습니다.
    <a th:href="@{/announcement/list}">목록으로 돌아가기</a>
  </div>
</div>
</body>
</html>
